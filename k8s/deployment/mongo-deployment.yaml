apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-mongodb
  labels:
    app: front-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-mongodb
  template:
    metadata:
      labels:
        app: front-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: photo-secret
                  key: MONGO_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photo-secret
                  key: MONGO_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: "artgallery"
          volumeMounts:
            - name: mongo-init-script
              mountPath: /docker-entrypoint-initdb.d
          volumes:
            - name: mongo-init-script
              configMap:
                name: mongo-init-script