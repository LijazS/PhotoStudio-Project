apiVersion: apps/v1
kind: Deployment
metadata:
  name: photo-app
  labels:
    app: photo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photo-app
  template:
    metadata:
      name: photo-app
      labels:
        app: photo-app
    spec:               # <-- this was missing
      containers:
        - name: photo-container
          image: lijazs/photo-app:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: photo-configmap
            - secretRef:
                name: photo-secret